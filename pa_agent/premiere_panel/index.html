<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ClipButler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1c1c1e; --surface: #2c2c2e; --border: #3a3a3c;
      --accent: #6c63ff; --text: #f2f2f7; --dim: #8e8e93;
      --success: #34c759; --fail: #ff3b30;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, "Segoe UI", sans-serif; font-size: 13px; }

    header { padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    header h1 { font-size: 14px; font-weight: 700; color: var(--accent); }
    .status { margin-left: auto; font-size: 11px; color: var(--dim); display: flex; align-items: center; gap: 4px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); }

    .search-row { display: flex; gap: 6px; padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .search-row input { flex: 1; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 13px; }
    .search-row input:focus { outline: none; border-color: var(--accent); }
    .search-row button { padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; }

    .filters { padding: 8px 12px; display: flex; gap: 6px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .filters select, .filters input {
      padding: 4px 6px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 11px;
    }

    .results { overflow-y: auto; height: calc(100vh - 140px); }
    .result-item {
      display: flex; gap: 10px; padding: 10px 12px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: background 0.1s;
    }
    .result-item:hover { background: var(--surface); }
    .thumb { width: 80px; height: 45px; object-fit: cover; border-radius: 3px; background: var(--surface); flex-shrink: 0; }
    .thumb-placeholder { width: 80px; height: 45px; background: var(--border); border-radius: 3px; display: flex; align-items: center; justify-content: center; color: var(--dim); flex-shrink: 0; }
    .info { flex: 1; min-width: 0; }
    .fname { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .desc { font-size: 11px; color: var(--dim); margin-top: 3px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .import-btn { align-self: center; padding: 4px 10px; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; flex-shrink: 0; }

    #status-bar { padding: 6px 12px; font-size: 11px; color: var(--dim); background: var(--surface); border-top: 1px solid var(--border); }
  </style>
</head>
<body>

<header>
  <h1>ClipButler</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="svc-status">Connecting…</span>
  </div>
</header>

<div class="search-row">
  <input type="text" id="q" placeholder="outdoor interview, red jacket…" />
  <button onclick="search()">Go</button>
</div>

<div class="filters">
  <select id="f-res">
    <option value="">Any Res</option>
    <option value="4k">4K</option>
    <option value="2k">2K</option>
    <option value="1080p">1080p</option>
  </select>
  <input type="text" id="f-cam" placeholder="Camera…" style="width:80px" />
  <input type="number" id="f-fps" placeholder="FPS" style="width:54px" />
</div>

<div class="results" id="results"></div>

<div id="status-bar">Ready</div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
</body>
</html>
